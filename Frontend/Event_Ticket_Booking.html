<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration | EventConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background : linear-gradient(135deg, #4f79f5, #956be2);
            color: var(--text-dark);
            padding: 2rem 1rem;
        }

        .reg-container {
            max-width: 600px;
            margin: 0 auto;
            background:  rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 1.8rem;
        }

        .header p {
            color: #6b7280;
            margin-top: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #f9fafb;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        /* Readonly fields styling to show they are auto-filled */
        input[readonly] {
            background-color: #f3f4f6;
            cursor: not-allowed;
            color: #6b7280;
        }

        .booking-id-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .payment-link-btn {
            background: #10b981;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            transition: background 0.3s;
        }

        .payment-link-btn:hover {
            background: #059669;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 500px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="reg-container">
        <div class="header">
            <h1>Event Registration</h1>
            <p>Meeru select chesina event kosam details fill cheyandi</p>
        </div>

        <form id="regForm">
            <div class="form-grid">
                <!-- User Details (Auto-filled from Dashboard/Login) -->
                <div class="form-group full-width">
                    <label>Full Name</label>
                    <input type="text" id="stuName" value="Rahul Kumar" readonly>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="stuEmail" value="rahul.k@university.edu" readonly>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="stuPhone" value="+91 9876543210" readonly>
                </div>

                <div class="form-group">
                    <label>College Name</label>
                    <input type="text" id="stuCollege" value="ABC Institute of Technology" readonly>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="stuDept" value="Computer Science" readonly>
                </div>

                <div class="form-group full-width">
                    <label>Gender</label>
                    <input type="text" id="stuGender" value="Male" readonly>
                </div>

                <!-- Last 2nd Box: Login Password (As requested) -->
                <div class="form-group full-width">
                    <label>Confirm Login Password (Security Check)</label>
                    <input type="password" id="loginPass" placeholder="Meeru login ayye password ikkada ivvandi" required>
                </div>

                <!-- Last Box: Ticket Booking ID with Payment Link -->
                <div class="form-group full-width">
                    <label>Ticket Booking ID</label>
                    <div class="booking-id-row">
                        <input type="text" id="bookingId" value="EC-BK-99231" readonly>
                        <a href="Booking_Page.html" class="payment-link-btn">
                            💳 Pay Now
                        </a>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Registration</button>
        </form>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const pass = document.getElementById('loginPass').value;
            if(pass) {
                alert('Registration Successful! Mee Ticket ID: ' + document.getElementById('bookingId').value);
                window.location.href = 'Booking_Page.html';
            } else {
                alert('Daya chesi password enter cheyandi.');
            }
        };

        // Simulating Dynamic Booking ID generation
        window.onload = function() {
            const randomId = "EC-BK-" + Math.floor(10000 + Math.random() * 90000);
            document.getElementById('bookingId').value = randomId;
        };
    </script>
</body>
</html>
